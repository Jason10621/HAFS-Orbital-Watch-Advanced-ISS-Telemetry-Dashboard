<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAFS 3D Orbital Watch (Full-Stack)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
    
    <header>
        <div class="header-container">
            <div class="hafs-logo">HAFS</div>
            <div class="title-group">
                <h1>3D ORBITAL WATCH</h1>
                <p>Advanced Real-Time Telemetry & SGP4 Propagator</p>
            </div>
            
            <div class="target-selector">
                <label for="sat-select">TARGET SATELLITE:</label>
                <select id="sat-select">
                    <option value="iss">ISS (International Space Station)</option>
                    <option value="hubble">HST (Hubble Space Telescope)</option>
                    <option value="tiangong">CSS (Tiangong Space Station)</option>
                    <option value="aqua">AQUA (Earth Observation)</option>
                </select>
            </div>

            <div class="system-status">
                <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
                <br>
                <span class="status-dot"></span> <span id="sat-name-display">SYSTEM LIVE</span>
                <div id="last-update">Last Update: --:--:--</div>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <section class="panel map-panel">
            <div class="panel-header">
                <h2>O1. 3D ORBITAL TRACKER (WebGL)</h2>
            </div>
            <div id="globeViz" class="map-container"></div> 
        </section>

        <section class="panel telemetry-panel">
            <div class="panel-header">
                <h2>O2. CORE TELEMETRY</h2>
                <button id="unit-toggle">Metric (km/h)</button>
            </div>
            <div class="data-grid">
                <div class="data-card">
                    <label>LATITUDE</label>
                    <span id="lat-val" class="mono-data">--.----°</span>
                </div>
                <div class="data-card">
                    <label>LONGITUDE</label>
                    <span id="lon-val" class="mono-data">--.----°</span>
                </div>
                <div class="data-card">
                    <label>ALTITUDE</label>
                    <span id="alt-val" class="mono-data">--.-- km</span>
                </div>
                <div class="data-card">
                    <label>VELOCITY</label>
                    <span id="vel-val" class="mono-data">--,--- km/h</span>
                </div>
            </div>
        </section>

        <section class="panel hafs-panel">
            <div class="panel-header">
                <h2>O3. THE HAFS POINT</h2>
            </div>
            <div class="data-vertical">
                <div class="special-data-card">
                    <label>3D SPATIAL DISTANCE FROM HAFS</label>
                    <span id="dist-hafs" class="mono-data special-text">--,---.-- km</span>
                </div>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
