<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAFS Orbital Worldview</title>
    <!-- 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- 3D 및 궤도 연산 라이브러리 (CDN) -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
</head>
<body>
    
    <header>
        <div class="header-container">
            <div class="hafs-logo">HAFS</div>
            <div class="title-group">
                <h1>ORBITAL WORLDVIEW</h1>
                <p>NASA Earth Observatory & SGP4 Tracking System</p>
            </div>
            
            <div class="system-status">
                <span class="status-dot"></span> <span id="status-text">INITIALIZING ENGINE...</span>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <!-- 좌측: 위성 목록 및 제어 -->
        <section class="panel control-panel">
            <div class="panel-header"><h2>O1. SATELLITE CONSTELLATION</h2></div>
            
            <p style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 15px;">
                관측할 위성을 선택하세요. 시스템이 실시간 TLE 데이터를 파싱하여 SGP4 모델로 궤도를 그립니다.
            </p>

            <!-- 위성 선택 리스트 -->
            <div class="sat-list" id="sat-list">
                <!-- JS에서 동적으로 생성됨 -->
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <label>Orbit Trail Length (궤적 표시 길이)</label>
                <input type="range" id="trail-slider" min="10" max="180" value="90">
                <span id="trail-val" class="mono-data">±90 Minutes</span>
            </div>
        </section>

        <!-- 중앙: 3D 월드뷰 -->
        <section class="panel map-panel">
            <div class="panel-header" style="position: absolute; top: 20px; left: 20px; z-index: 10; border: none; background: rgba(13, 27, 42, 0.8); padding: 10px; border-radius: 4px;">
                <h2>O2. 3D WORLDVIEW CANVAS</h2>
            </div>
            <div id="globeViz" class="viz-container"></div>
        </section>

        <!-- 우측: 라이브 텔레메트리 -->
        <section class="panel info-panel">
            <div class="panel-header"><h2>O3. LIVE TELEMETRY</h2></div>
            
            <div class="telemetry-card">
                <h3 id="tele-name" style="color: var(--color-status-green); margin-bottom: 15px;">--</h3>
                
                <div class="tele-data-row">
                    <label>NORAD ID</label>
                    <span id="tele-id" class="mono-data">--</span>
                </div>
                <div class="tele-data-row">
                    <label>LATITUDE (위도)</label>
                    <span id="tele-lat" class="mono-data">--.--°</span>
                </div>
                <div class="tele-data-row">
                    <label>LONGITUDE (경도)</label>
                    <span id="tele-lon" class="mono-data">--.--°</span>
                </div>
                <div class="tele-data-row">
                    <label>ALTITUDE (고도)</label>
                    <span id="tele-alt" class="mono-data">-- km</span>
                </div>
                <div class="tele-data-row">
                    <label>VELOCITY (속도)</label>
                    <span id="tele-vel" class="mono-data">-- km/s</span>
                </div>
            </div>

            <div class="special-data-card" style="margin-top: 20px;">
                <label>TIME TO NEXT ORBIT</label>
                <span id="tele-period" class="mono-data special-text" style="font-size: 24px;">-- mins</span>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
